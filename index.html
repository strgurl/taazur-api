<script type="text/babel">
  function App() {
    const [selectedSkills, setSelectedSkills] = React.useState([]);
    const [matches, setMatches] = React.useState([]);
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState("");

    const allSkills = [
      "React",
      "Node.js",
      "Python",
      "Data Science",
      "UI/UX Design",
      "Machine Learning",
      "Cloud Computing",
      "Cybersecurity",
      "Marketing",
      "Project Management",
    ];

    function toggleSkill(skill) {
      setSelectedSkills((prev) =>
        prev.includes(skill)
          ? prev.filter((s) => s !== skill)
          : [...prev, skill]
      );
    }

    async function findTeammates() {
      setLoading(true);
      setError("");
      setMatches([]);

      try {
        const response = await fetch(
          "[taazur-api.onrender.com](https://taazur-api.onrender.com/api/recommend)",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              skills: Object.fromEntries(
                selectedSkills.map((skill) => [skill, 1])
              ),
            }),
          }
        );

        if (!response.ok) {
          throw new Error("Failed to fetch recommendations");
        }

        const data = await response.json();

        if (Array.isArray(data.matches)) {
          setMatches(data.matches);
        } else if (Array.isArray(data)) {
          setMatches(data);
        } else {
          setMatches([]);
        }
      } catch (err) {
        console.error(err);
        setError("Could not load teammates. Please try again.");
      } finally {
        setLoading(false);
      }
    }

    return (
      <div className="container">
        <h1>Find Teammates</h1>

        <div className="skills-container">
          {allSkills.map((skill) => (
            <button
              key={skill}
              onClick={() => toggleSkill(skill)}
              className={selectedSkills.includes(skill) ? "selected" : ""}
            >
              {skill}
            </button>
          ))}
        </div>

        <button className="find-btn" onClick={findTeammates}>
          Find Teammates
        </button>

        {loading && <p className="loading">Finding best matches...</p>}
        {error && <p className="error">{error}</p>}

        <div className="matches-container">
          {!loading &&
            matches.map((m, index) => (
              <div key={index} className="match-card">
                <h3>{m.name || "Unnamed User"}</h3>

                {m.skills && (
                  <p>
                    <strong>Skills:</strong>{" "}
                    {Array.isArray(m.skills)
                      ? m.skills.join(", ")
                      : Object.keys(m.skills).join(", ")}
                  </p>
                )}

                {m.bio && <p>{m.bio}</p>}

                {!m.skills && !m.bio && (
                  <p>No additional info provided.</p>
                )}
              </div>
            ))}

          {!loading && !error && matches.length === 0 && (
            <p>No results yet. Select your skills and click “Find Teammates”.</p>
          )}
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
