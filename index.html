  .action-btn-primary:hover { transform: translateX(3px); }
  .action-btn-secondary { background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.15); }
  .action-btn-secondary:hover { background: rgba(255,255,255,.15); transform: translateX(3px); }
  .team-detail-hero { background: linear-gradient(135deg, var(--ink), #1e1b4b); border-radius: var(--r-lg); padding: 28px; color: var(--white); margin-bottom: 24px; position: relative; overflow: hidden; }
  .team-detail-hero::after { content: ''; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(79,70,229,.25) 0%, transparent 70%); pointer-events: none; }
  .chat-window { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); display: flex; flex-direction: column; height: 420px; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { max-width: 75%; }
  .chat-msg-me { align-self: flex-end; }
  .chat-msg-them { align-self: flex-start; }
  .chat-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.4; }
  .chat-bubble-me { background: var(--accent); color: var(--white); border-bottom-right-radius: 4px; }
  .chat-bubble-them { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; }
  .chat-sender { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 99px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
  .chat-input:focus { border-color: var(--accent); }
  .privacy-note { font-size: 12px; padding: 8px 12px; border-radius: var(--r-sm); margin-top: 6px; }
  .privacy-private { background: rgba(239,68,68,.08); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .privacy-public { background: rgba(16,185,129,.08); color: var(--green); border: 1px solid rgba(16,185,129,.2); }
  .completion-bar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 8px; }
  .completion-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 99px; transition: width .6s; }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
  .mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
  .mb-16 { margin-bottom: 16px; } .mb-24 { margin-bottom: 24px; }
  .text-sm { font-size: 13px; } .text-muted { color: var(--text3); }
  .success-banner { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .info-banner { background: rgba(79,70,229,.07); border: 1px solid rgba(79,70,229,.15); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .error-banner { font-size: 13px; padding: 10px 14px; background: rgba(239,68,68,.08); border-radius: var(--r-sm); border: 1px solid rgba(239,68,68,.2); color: var(--red); margin-bottom: 16px; }
  .notif-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; box-shadow: 0 0 6px var(--red); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; }
  .mobile-header { display: none; height: 56px; background: var(--ink); align-items: center; padding: 0 20px; gap: 12px; position: sticky; top: 0; z-index: 200; }
  .mobile-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--white); flex: 1; }
  .mobile-logo-img { width: 28px; height: 28px; object-fit: contain; }
  .hamburger { width: 32px; height: 32px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
  .hamburger span { width: 20px; height: 2px; background: var(--white); border-radius: 99px; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }
  @media (max-width: 768px) {
    .mobile-header { display: flex; }
    .sidebar { transform: translateX(-100%); top: 0; z-index: 100; }
    .sidebar.open { transform: none; }
    .sidebar-overlay.open { display: block; }
    .main-content { margin-left: 0; }
    .page { padding: 20px 16px; }
    .auth-left { display: none; }
    .auth-right { width: 100%; min-width: 0; padding: 32px 24px; }
    .auth-shell { background: var(--surface); }
    .form-row, .two-col { grid-template-columns: 1fr; }
    .match-grid { grid-template-columns: 1fr; }
    .welcome-banner { flex-direction: column; gap: 20px; align-items: flex-start; }
    .welcome-actions { flex-direction: row; flex-wrap: wrap; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .profile-hero { flex-direction: column; text-align: center; }
  }
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const LOGO_SRC = document.getElementById('logo-data').textContent.trim();

// ── MOCK DATA ──────────────────────────────────
const MOCK_USERS = [
  { id:1, name:"Sarah Al-Rashid", email:"sarah@uni.edu", password:"123456", major:"Computer Science", college:"Engineering", year:"2" },
  { id:2, name:"Khalid Mansour",  email:"khalid@uni.edu", password:"123456", major:"Data Science", college:"Science", year:"4" },
];
const ALL_SKILLS = ["Python","JavaScript","React","Node.js","Machine Learning","Data Analysis","UI/UX Design","Figma","Deep Learning","Backend Dev","Mobile Dev","SQL","DevOps","Cybersecurity","NLP","Computer Vision","Flutter","Swift","Project Management","Research"];
const SKILL_LEVEL_LABELS = { 1:"Beginner", 2:"Intermediate", 3:"Advanced" };
const API = "https://taazur-api.onrender.com";
const SKILL_MAP = {
  "Python":"programming","JavaScript":"programming","React":"uiux","Node.js":"programming",
  "Machine Learning":"ai_ml","Data Analysis":"data_analysis","UI/UX Design":"uiux",
  "Figma":"uiux","Deep Learning":"ai_ml","Backend Dev":"programming","Mobile Dev":"programming",
  "SQL":"data_analysis","DevOps":"programming","Cybersecurity":"programming","NLP":"ai_ml",
  "Computer Vision":"ai_ml","Flutter":"programming","Swift":"programming",
  "Project Management":"project_mgmt","Research":"research"
};

// ── UTILITIES ─────────────────────────────────
const getScoreClass = s => s>=80?"high":s>=60?"medium":"low";
const getScoreColor = s => s>=80?"#10b981":s>=60?"#f59e0b":"#8b8d9e";
const getInitials   = name => name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();

const ScoreRing = ({ score, size=52 }) => {
  const r=(size-6)/2, circ=2*Math.PI*r, fill=(score/100)*circ, color=getScoreColor(score);
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${fill} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:size>50?14:11,color}}>{score}%</span>
      </div>
    </div>
  );
};

// ── LOGIN PAGE ─────────────────────────────────
const LoginPage = ({ onLogin, onSwitch }) => {
  const [email,setEmail]=useState(""), [password,setPassword]=useState(""), [error,setError]=useState(""), [loading,setLoading]=useState(false);
  const handleSubmit = async e => {
    e.preventDefault(); setError("");
    if(!email||!password){setError("Please fill in all fields.");return;}
    setLoading(true);
    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
      const doc = await firebase.firestore().collection("users").doc(cred.user.uid).get();
      const userData = doc.exists ? {...doc.data(), user_id:cred.user.uid, id:cred.user.uid}
        : {user_id:cred.user.uid, id:cred.user.uid, name:email, email:email.trim().toLowerCase()};
      onLogin(userData);
    } catch(e) {
      const msg = (e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")
        ? "Invalid email or password." : "Login failed. Please try again.";
      setError(msg);
    }
    setLoading(false);
  };
  return (
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-logo-area">
          <img src={LOGO_SRC} className="auth-logo-img" alt="Taazur Logo"/>
          <div className="auth-brand">Taazur<span>.</span></div>
        </div>
        <p className="auth-tagline">AI-based student team formation system that helps you find the perfect teammates based on your skills and needs.</p>
        {["Skill-based compatibility matching","AI-generated match explanations","Real-time team collaboration tools","Smart invite & request system"].map((f,i)=>(
          <div className="auth-feature" key={i}><span className="auth-feature-dot"/>{f}</div>
        ))}
      </div>
      <div className="auth-right">
        <div className="auth-card">
          <div className="auth-card-title">Welcome back</div>
          <div className="auth-card-sub">Sign in to your Taazur account</div>
          {error&&<div className="error-banner">{error}</div>}
          <form onSubmit={handleSubmit}>
            <div className="form-group"><label className="form-label">Email Address</label>
              <input className="form-input" type="email" placeholder="you@university.edu" value={email} onChange={e=>setEmail(e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Password</label>
              <input className="form-input" type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}/></div>
            <button type="submit" className="btn btn-primary btn-full btn-lg" style={{marginTop:8}} disabled={loading}>{loading?"Signing in…":"Sign In →"}</button>
          </form>
          <div className="auth-switch">Don't have an account? <a onClick={onSwitch}>Create one</a></div>
        </div>
      </div>
    </div>
  );
};

// ── SIGNUP PAGE ────────────────────────────────
const SignupPage = ({ onLogin, onSwitch }) => {
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",email:"",password:"",major:"",college:"",year:""});
  const [skills,setSkills]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleSkill=s=>setSkills(a=>a.includes(s)?a.filter(x=>x!==s):[...a,s]);

  const handleNext=e=>{
    e.preventDefault(); setError("");
    if(!form.name||!form.email||!form.password){setError("Name, email and password are required.");return;}
    if(form.password.length<6){setError("Password must be at least 6 characters.");return;}
    setStep(2);
  };

  const handleCreate=async()=>{
    if(skills.length===0){setError("Please select at least one skill.");return;}
    setError(""); setLoading(true);
    try {
      const cred = await firebase.auth().createUserWithEmailAndPassword(form.email.trim(), form.password);
      const uid = cred.user.uid;
      const userObj = {
        user_id:uid, id:uid,
        name:form.name.trim(), email:form.email.trim().toLowerCase(),
        major:form.major, college:form.college, year:form.year,
        profileSkills:skills,
        skillLevels:Object.fromEntries(skills.map(s=>[s,2]))
      };
      await firebase.firestore().collection("users").doc(uid).set(userObj);
      try {
        const skillsDict={};
        skills.forEach(s=>{const k=SKILL_MAP[s];if(k)skillsDict[k]=Math.min(1.0,(skillsDict[k]||0)+0.7);});
        await fetch(API+"/api/register",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({user_id:uid,name:userObj.name,major:form.major,year:form.year,skills:skillsDict,needs:[]})});
      } catch(e){ console.warn("Backend registration failed, continuing."); }
      // Send email verification
      try { await firebase.auth().currentUser.sendEmailVerification(); } catch(e){}
      onLogin(userObj);
    } catch(e) {
      const msg = e.code==="auth/email-already-in-use" ? "An account with this email already exists."
        : e.code==="auth/weak-password" ? "Password must be at least 6 characters."
        : "Signup failed. Please try again.";
      setError(msg);
    }
    setLoading(false);
  };

  if(step===1) return (
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-logo-area">
          <img src={LOGO_SRC} className="auth-logo-img" alt="Taazur Logo"/>
          <div className="auth-brand">Taazur<span>.</span></div>
        </div>
        <p className="auth-tagline">AI-based student team formation system that helps you find the perfect teammates based on your skills and needs.</p>
        {["Set up your skill profile in minutes","Get matched with compatible teammates","Form teams and start building together","Connect with the best talent at your university"].map((f,i)=>(
          <div className="auth-feature" key={i}><span className="auth-feature-dot"/>{f}</div>
        ))}
      </div>
      <div className="auth-right">
        <div className="auth-card">
          <div className="auth-card-title">Create account</div>
          <div className="auth-card-sub">Join Taazur — it's free</div>
          {error&&<div className="error-banner">{error}</div>}
          <form onSubmit={handleNext}>
            <div className="form-group"><label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your full name" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Email Address</label>
              <input className="form-input" type="email" placeholder="you@university.edu" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Password</label>
              <input className="form-input" type="password" placeholder="Create a strong password" value={form.password} onChange={e=>set("password",e.target.value)}/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Major</label>
                <input className="form-input" placeholder="e.g. Computer Science" value={form.major} onChange={e=>set("major",e.target.value)}/></div>
              <div className="form-group"><label className="form-label">College / Faculty</label>
                <input className="form-input" placeholder="e.g. Engineering" value={form.college} onChange={e=>set("college",e.target.value)}/></div>
            </div>
            <div className="form-group"><label className="form-label">Academic Year</label>
              <select className="form-select" value={form.year} onChange={e=>set("year",e.target.value)}>
                <option value="">Select year…</option>
                {[1,2,3,4,5,6].map(y=><option key={y} value={String(y)}>Year {y}</option>)}
              </select></div>
            <button type="submit" className="btn btn-primary btn-full btn-lg" style={{marginTop:4}}>Next: Choose Skills →</button>
          </form>
          <div className="auth-switch">Already have an account? <a onClick={onSwitch}>Sign in</a></div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-logo-area">
          <img src={LOGO_SRC} className="auth-logo-img" alt="Taazur Logo"/>
          <div className="auth-brand">Taazur<span>.</span></div>
        </div>
        <p className="auth-tagline">Select the skills you have — the AI uses them to find your ideal teammates.</p>
        {["Skill-based compatibility matching","AI-generated match explanations","Real-time team collaboration tools"].map((f,i)=>(
          <div className="auth-feature" key={i}><span className="auth-feature-dot"/>{f}</div>
        ))}
      </div>
      <div className="auth-right" style={{overflowY:"auto"}}>
        <div className="auth-card">
          <div className="auth-card-title">Your skills</div>
          <div className="auth-card-sub">Select all that apply</div>
          {error&&<div className="error-banner">{error}</div>}
          <div className="skill-chip-select" style={{marginBottom:16}}>
            {ALL_SKILLS.map(s=>(
              <button key={s} type="button"
                style={{
                  padding:"6px 14px", borderRadius:"99px", fontSize:"13px",
                  cursor:"pointer", transition:"all .2s", fontFamily:"DM Sans,sans-serif",
                  border: skills.includes(s) ? "1.5px solid var(--accent)" : "1.5px solid var(--border)",
                  background: skills.includes(s) ? "var(--accent)" : "var(--white)",
                  color: skills.includes(s) ? "var(--white)" : "var(--text2)",
                  margin:"2px"
                }}
                onClick={()=>toggleSkill(s)}>{s}</button>
            ))}
          </div>
          {skills.length>0&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>{skills.length} skill{skills.length!==1?"s":""} selected</div>}
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-outline" onClick={()=>{setStep(1);setError("");}}>← Back</button>
            <button className="btn btn-accent btn-full btn-lg" onClick={handleCreate} disabled={loading||skills.length===0}>
              {loading?"Creating account…":"Create Account →"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── SIDEBAR ────────────────────────────────────
const Sidebar = ({ page, setPage, user, onLogout, pendingCount, open, onClose }) => {
  const navItems = [
    {id:"dashboard",icon:"⊞",label:"Dashboard"},
    {id:"find",     icon:"◎",label:"Find Teammates"},
    {id:"teams",    icon:"⬡",label:"My Teams",badge:pendingCount},
    {id:"profile",  icon:"◉",label:"My Profile"},
  ];
  return (
    <>
      <div className={`sidebar-overlay ${open?"open":""}`} onClick={onClose}/>
      <nav className={`sidebar ${open?"open":""}`}>
        <div className="sidebar-logo">
          <img src={LOGO_SRC} className="logo-img" alt="Taazur Logo"/>
          <div className="logo-text">
            <div className="logo-mark">Taazur</div>
            <div className="logo-sub">AI Team Formation</div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section-label">Navigation</div>
          {navItems.map(item=>(
            <button key={item.id} className={`nav-item ${page===item.id?"active":""}`}

              <span style={{flex:1}}>{item.label}</span>
              {item.badge>0&&<span className="badge">{item.badge}</span>}

        </div>
        <div className="sidebar-footer">
          <div className="user-mini" onClick={()=>{setPage("profile");onClose();}}>
            <div className="avatar">{getInitials(user.name)}</div>
            <div className="user-info-mini">
              <div className="user-name-mini">{user.name}</div>
              <div className="user-role-mini">{user.major||"Student"}</div>
            </div>
          </div>
        </div>
      </nav>
    </>
  );
};

// ── DASHBOARD ─────────────────────────────────
const DashboardPage = ({ user, setPage }) => {
  const calcCompletion = (u) => {
    let s = 0;
    if(u.name) s+=20; if(u.major) s+=20; if(u.year) s+=20;
    if(u.bio) s+=20; if(u.skillLevels&&Object.keys(u.skillLevels).length>0) s+=20;
    return s;
  };
  const profileCompletion = calcCompletion(user);
  const checkItems = [
    {label:"Basic Info",done:true},
    {label:"Skills Added",done:!!(user.skillLevels&&Object.keys(user.skillLevels).length>0)},
    {label:"Year Set",done:!!user.year},
    {label:"Bio Written",done:!!user.bio},
  ];
  return (
    <div className="page page-enter">
      <div className="welcome-banner">
        <div className="welcome-text">
          <div className="welcome-greeting">Good day,</div>
          <div className="welcome-name">Hello, <span>{user.name.split(" ")[0]}</span> 👋</div>
          <div className="welcome-sub">Find your perfect team using Taazur AI‑powered matching</div>
        </div>
        <div className="welcome-actions">
          <button className="action-btn action-btn-primary" onClick={()=>setPage("find")}>◎ Find Teammates</button>
          <button className="action-btn action-btn-secondary" onClick={()=>setPage("teams")}>⬡ My Teams</button>
          <button className="action-btn action-btn-secondary" onClick={()=>setPage("teams")}>⊕ Join Team</button>
        </div>
      </div>
      <div className="two-col">
        <div className="card">
          <div className="flex-between mb-16">
            <div>
              <div className="card-title">Profile Completion</div>
              <div className="card-sub">{profileCompletion===100?"Your profile is complete!":"Complete to get better matches"}</div>
            </div>
            <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,color:profileCompletion===100?"var(--green)":"var(--accent)"}}>
              {profileCompletion===100?"🎉":""+profileCompletion+"%"}
            </span>
          </div>
          <div className="completion-bar" style={{height:8,marginBottom:16}}>
            <div className="completion-fill" style={{width:profileCompletion+"%",background:profileCompletion===100?"var(--green)":undefined}}/>
          </div>
          {checkItems.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:14,color:item.done?"var(--green)":"var(--surface3)"}}>{item.done?"✓":"○"}</span>
              <span style={{fontSize:14,color:item.done?"var(--text)":"var(--text3)"}}>{item.label}</span>
            </div>
          ))}
          <button className="btn btn-primary btn-sm mt-16" onClick={()=>setPage("profile")}>
            {profileCompletion===100?"View Profile →":"Complete Profile →"}
          </button>

// ── FIND TEAMMATES ─────────────────────────────
const FindPage = ({ user }) => {
  const [mySkills,setMySkills]=useState(user.profileSkills||[]);
  const [neededSkills,setNeededSkills]=useState([]);
  const [results,setResults]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [invitedIds,setInvitedIds]=useState([]);
  const [profileModal,setProfileModal]=useState(null);
  const toggle=(skill,arr,setArr)=>setArr(a=>a.includes(skill)?a.filter(s=>s!==skill):[...a,skill]);

  const scoreUsers = (otherUsers) => {
    const myId = user.user_id || user.id;
    const neededSet = new Set(neededSkills);
    return otherUsers
      .filter(u => (u.user_id||u.id) !== myId && u.name)
      .map(u => {
        const theirSkills = u.profileSkills || [];
        const covered = theirSkills.filter(s => neededSet.has(s)).length;
        const coverageScore = neededSet.size > 0 ? covered / neededSet.size : 0;
        const mySet = new Set(mySkills);
        const theirSet = new Set(theirSkills);
        const allSkills = new Set([...mySet, ...theirSet]);
        const overlap = [...mySet].filter(s => theirSet.has(s)).length;
        const diversity = allSkills.size > 0 ? 1 - overlap / allSkills.size : 0.5;
        const raw = neededSet.size > 0 ? coverageScore * 0.7 + diversity * 0.3 : diversity;
        const score = Math.min(100, Math.max(10, Math.round(raw * 100)));
        const provides = theirSkills.filter(s => neededSet.has(s));
        const explanation = provides.length > 0
          ? "Has needed skills: " + provides.slice(0,3).join(", ")
          : theirSkills.length > 0
            ? "Skills: " + theirSkills.slice(0,3).join(", ")
            : "Complementary profile";
        return {
          id: u.user_id || u.id,
          name: u.name,
          major: u.major || "",
          year: u.year ? "Year "+u.year : "",
          score,
          skills: theirSkills,
          explanation,
          available: true,
          fullProfile: u
        };
      })
      .sort((a,b) => b.score - a.score);
  };

  const findMatches = async () => {
    if(mySkills.length === 0) return;
    setLoading(true); setResults(null); setError(null);
    try {
      const snapshot = await firebase.firestore().collection("users").get();
      const allUsers = snapshot.docs.map(d => d.data());
      const scored = scoreUsers(allUsers);
      setResults(scored);
    } catch(e) {
      setError("Could not load users. Please try again.");
    }
    setLoading(false);
  };
  return (
    <div className="page page-enter">
      <div className="section-header"><div className="section-title">Find Teammates</div><div className="section-sub">Select your skills and what you need — Taazur AI finds your best matches</div></div>
      <div className="find-form-card">
        <div style={{position:"relative",zIndex:1}}>
          <div className="find-form-title">Configure Your Match</div>
          <div className="find-form-sub">Taazur analyzes skill complementarity to suggest the best teammates</div>
          <div className="two-col" style={{gap:28}}>
            <div><label className="find-form-label">Skills I Have</label>
              <div className="skill-chip-select">{ALL_SKILLS.map(s=>(
                <button key={s} className={`skill-chip ${mySkills.includes(s)?"selected":""}`} onClick={()=>toggle(s,mySkills,setMySkills)}>{s}</button>
              ))}</div></div>
            <div><label className="find-form-label">Skills I Need</label>
              <div className="skill-chip-select">{ALL_SKILLS.map(s=>(
                <button key={s} className={`skill-chip skill-chip-need ${neededSkills.includes(s)?"selected":""}`} onClick={()=>toggle(s,neededSkills,setNeededSkills)}>{s}</button>
              ))}</div></div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginTop:8}}>
            <button className="btn btn-accent btn-lg" onClick={findMatches} disabled={loading||mySkills.length===0}>{loading?"Finding matches…":"⚡ Find My Matches"}</button>
            {mySkills.length>0&&<span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{mySkills.length} skills · {neededSkills.length} needed</span>}
          </div>
        </div>
      </div>
      {loading&&<div className="loading-state"><div className="spinner"/><div className="loading-text">Analyzing compatibility with AI model…</div><div style={{fontSize:12,color:"var(--text3)"}}>Comparing skill vectors and complementarity scores</div></div>}
      {results&&!loading&&(
        <>
          <div className="results-meta">
            <div className="results-count">Found <strong>{results.length} matches</strong> — sorted by compatibility</div>
            <div style={{display:"flex",gap:12,fontSize:12,color:"var(--text3)"}}><span>🟢 High ≥80%</span><span>🟡 Med 60–79%</span><span>⚪ Low &lt;60%</span></div>
          </div>
          <div className="match-grid">
            {results.sort((a,b)=>b.score-a.score).map(match=>{
              const tier=getScoreClass(match.score), invited=invitedIds.includes(match.id);
              return (
                <div key={match.id} className={`match-card match-${tier}`}>
                  <div className="match-header">
                    <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
                      <div className="avatar">{getInitials(match.name)}</div>
                      <div className="match-info">
                        <div className="match-name">{match.name}</div>
                        <div className="match-major">{match.major} · {match.year}</div>
                        {!match.available&&<span className="tag tag-red" style={{marginTop:4,fontSize:11}}>Unavailable</span>}
                      </div>
                    </div>
                    <ScoreRing score={match.score} size={56}/>
                  </div>
                  <div className="match-explanation">💡 {match.explanation}</div>
                  <div className="tags-wrap mb-16">{match.skills.map(s=><span key={s} className="tag tag-accent">{s}</span>)}</div>
                  <div className="match-footer">
                    <div style={{fontSize:12,color:"var(--text3)"}}>{match.year}</div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>setProfileModal(match.fullProfile)}>View Profile</button>
                      {invited?<div className="invite-sent">✓ Invite sent</div>:
                        <button className="btn btn-primary btn-sm" onClick={()=>setInvitedIds(ids=>[...ids,match.id])}>Invite +</button>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
      {results&&results.length===0&&!loading&&(
        <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-title">No matches yet</div><div className="empty-sub">Be the first! Ask your teammates to register their profiles on Taazur, then search again.</div></div>
      )}
      {!results&&!loading&&(
        <div className="empty-state"><div className="empty-icon">◎</div><div className="empty-title">Ready to find your team?</div><div className="empty-sub">Select your skills above and click "Find My Matches"</div></div>
      )}
      {error&&!loading&&<div className="error-banner">⚠ {error}</div>}
      {profileModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target.className.includes("modal-overlay"))setProfileModal(null);}}>
          <div className="modal">
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
              <div className="avatar lg">{getInitials(profileModal.name)}</div>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontSize:20,fontWeight:800}}>{profileModal.name}</div>
                <div style={{fontSize:13,color:"var(--text3)"}}>{profileModal.major}{profileModal.year?" · Year "+profileModal.year:""}</div>
                {profileModal.college&&<div style={{fontSize:13,color:"var(--text3)"}}>{profileModal.college}</div>}
              </div>
            </div>
            {profileModal.bio&&<p style={{fontSize:14,color:"var(--text2)",marginBottom:16,lineHeight:1.6}}>{profileModal.bio}</p>}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px",color:"var(--text3)",marginBottom:8}}>Skills</div>
              <div className="tags-wrap">
                {(profileModal.profileSkills||[]).length>0
                  ?(profileModal.profileSkills||[]).map(s=><span key={s} className="tag tag-accent">{s}</span>)
                  :<span style={{fontSize:13,color:"var(--text3)"}}>No skills listed</span>}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setProfileModal(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── PROFILE PAGE ───────────────────────────────
const ProfilePage = ({ user, updateUser, onLogout }) => {
  const [editMode,setEditMode]=useState(false);
  const [form,setForm]=useState({name:user.name,major:user.major||"",college:user.college||"",year:user.year||"",bio:user.bio||""});
  const [skillLevels,setSkillLevels]=useState(user.skillLevels||{Python:2,"Machine Learning":3,React:1,"Data Analysis":2});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const saveProfile = async () => {
    // Build skill levels for API (scale 1-3 → 0.33-1.0)
    const apiSkills = {};
    Object.entries(skillLevels).forEach(([skill, val]) => {
      const SKILL_MAP = {
        "Python":"programming","JavaScript":"programming","React":"uiux","Node.js":"programming",
        "Machine Learning":"ai_ml","Data Analysis":"data_analysis","UI/UX Design":"uiux",
        "Figma":"uiux","Deep Learning":"ai_ml","Backend Dev":"programming","Mobile Dev":"programming",
        "SQL":"data_analysis","DevOps":"programming","Cybersecurity":"programming","NLP":"ai_ml",
        "Computer Vision":"ai_ml","Flutter":"programming","Swift":"programming",
        "Project Management":"project_mgmt","Research":"research"
      };
      const k = SKILL_MAP[skill];
      if(k) apiSkills[k] = Math.min(1.0, (apiSkills[k]||0) + (val/3));
    });
    // Register user with backend
    try {
      await fetch(API+"/api/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          user_id: String(user.user_id || user.id || Date.now()),
          name: form.name,
          major: form.major,
          year: form.year,
          skills: apiSkills,
          needs: []
        })
      });
    } catch(e) { console.warn("API register failed, continuing locally"); }
    const updated = {...user,...form,skillLevels,profileComplete:true,profileSkills:Object.keys(skillLevels)};
    try {
      await firebase.firestore().collection("users").doc(updated.user_id||updated.id).set(updated,{merge:true});
    } catch(e){ console.warn("Firestore save failed"); }
    updateUser(updated);
    setEditMode(false); setSaved(true); setTimeout(()=>setSaved(false),2500);
  };

  const deleteAccount=async()=>{
    if(!window.confirm("Delete your account? This cannot be undone.")) return;
    if(!window.confirm("All your data will be permanently deleted. Are you sure?")) return;
    try {
      const uid = user.user_id || user.id;
      await firebase.firestore().collection("users").doc(uid).delete();
      await firebase.auth().currentUser.delete();
    } catch(e){
      if(e.code==="auth/requires-recent-login")
        alert("Please sign out and sign back in first, then try again.");
      else alert("Could not delete account: "+e.message);
    }
  };
  return (
    <div className="page page-enter">
      <div className="profile-hero">
        <div className="avatar lg" style={{flexShrink:0}}>{getInitials(user.name)}</div>
        <div style={{flex:1}}>
          <div className="profile-hero-name">{user.name}</div>
          <div className="profile-hero-sub">{user.email}</div>
          <div className="profile-hero-tags">
            {user.major&&<span className="hero-tag">{user.major}</span>}
            {user.college&&<span className="hero-tag">{user.college}</span>}
            {user.year&&<span className="hero-tag">Year {user.year}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexDirection:"column",alignItems:"flex-end",position:"relative",zIndex:1}}>
          <button className="btn btn-outline" style={{color:"rgba(255,255,255,.7)",borderColor:"rgba(255,255,255,.2)",background:"rgba(255,255,255,.05)"}}
            onClick={()=>setEditMode(!editMode)}>{editMode?"Cancel":"✎ Edit Profile"}</button>
          <button className="btn btn-danger btn-sm" onClick={onLogout}>↩ Sign Out</button>
          <button className="btn btn-sm" style={{background:"transparent",border:"1.5px solid var(--red)",color:"var(--red)",padding:"6px 12px",borderRadius:"var(--r-sm)",fontSize:13,cursor:"pointer"}} onClick={deleteAccount}>🗑 Delete Account</button>
        </div>
      </div>
      {saved&&<div className="success-banner mb-24">✓ Profile saved successfully!</div>}
      <div className="two-col">
        <div className="card">
          <div className="card-title mb-16">Basic Info</div>
          {editMode?(
            <>
              {[["Full Name","name"],["Major","major"],["College / Faculty","college"]].map(([label,key])=>(
                <div className="form-group" key={key}><label className="form-label">{label}</label>
                  <input className="form-input" value={form[key]} onChange={e=>set(key,e.target.value)}/></div>
              ))}
              <div className="form-group"><label className="form-label">Academic Year</label>
                <select className="form-select" value={form.year} onChange={e=>set("year",e.target.value)}>
                  {[1,2,3,4,5,6].map(y=><option key={y} value={String(y)}>Year {y}</option>)}
                </select></div>
              <div className="form-group"><label className="form-label">Bio</label>
                <textarea className="form-input" rows={3} placeholder="Tell teammates about yourself…" value={form.bio} onChange={e=>set("bio",e.target.value)} style={{resize:"vertical"}}/></div>
              <button className="btn btn-accent btn-full" onClick={saveProfile}>✓ Save Profile</button>
            </>
          ):(
            <div>
              {[["Major",user.major],["College",user.college],["Academic Year",user.year&&`Year ${user.year}`],["Email",user.email]].map(([k,v])=>v&&(
                <div key={k} style={{display:"flex",gap:10,marginBottom:12,fontSize:14}}>
                  <span style={{color:"var(--text3)",width:110,flexShrink:0}}>{k}</span>
                  <span style={{fontWeight:500}}>{v}</span>
                </div>
              ))}
              {user.bio&&<p style={{fontSize:14,color:"var(--text2)",marginTop:8,lineHeight:1.6}}>{user.bio}</p>}
            </div>
          )}
        </div>
        <div className="card">
          <div className="flex-between mb-16">
            <div>
              <div className="card-title">Skills I Have</div>
              <div className="card-sub">1 = Beginner · 2 = Intermediate · 3 = Advanced</div>
            </div>
          </div>
          {Object.entries(skillLevels).map(([skill,val])=>(
            <div key={skill} className="skill-bar-wrap">
              <div className="skill-bar-header">
                <span className="skill-bar-name">{skill}</span>
                {editMode?(
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="range" min={1} max={3} step={1} value={val}
                      onChange={e=>setSkillLevels(sl=>({...sl,[skill]:+e.target.value}))}
                      className="skill-slider" style={{width:70}}/>
                    <span className="skill-bar-val">{val}/3</span>
                    <span style={{cursor:"pointer",color:"var(--red)",fontSize:16,lineHeight:1}}
                      onClick={()=>setSkillLevels(sl=>{const n={...sl};delete n[skill];return n;})}>×</span>
                  </span>
                ):(
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:"var(--text3)"}}>{SKILL_LEVEL_LABELS[val]}</span>
                    <span className="skill-bar-val">{val}/3</span>
                  </span>
                )}
              </div>
              <div className="skill-bar-track">
                <div className="skill-bar-fill" style={{width:`${(val/3)*100}%`}}/>
              </div>
            </div>
          ))}
          {editMode&&(
            <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
              {ALL_SKILLS.filter(s=>!skillLevels[s]).map(s=>(
                <button key={s} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:12}}
                  onClick={()=>setSkillLevels(sl=>({...sl,[s]:1}))}>+ {s}</button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── TEAM DETAIL PAGE ───────────────────────────
const TeamDetailPage = ({ team, onBack, user }) => {
  const [chatInput,setChatInput]=useState("");
  const [messages,setMessages]=useState([]);
  const [memberProfiles,setMemberProfiles]=useState({});
  const [teamMembers,setTeamMembers]=useState(team.members||[]);
  const chatEndRef = React.useRef(null);
  const myId = user ? (user.user_id||user.id) : null;
  const isOwner = myId && team.createdBy===myId;

  const kickMember=async(member)=>{
    if(!window.confirm("Remove "+member.name+" from this team?")) return;
    try {
      await firebase.firestore().collection("teams").doc(team.id).update({
        memberIds: firebase.firestore.FieldValue.arrayRemove(member.uid),
        members: firebase.firestore.FieldValue.arrayRemove(member)
      });
      setTeamMembers(m=>m.filter(m2=>m2.uid!==member.uid));
    } catch(e){ alert("Could not remove member: "+e.message); }
  };

  // Load member skills from Firestore
  useEffect(()=>{
    if(!team.members) return;
    const uids = team.members.map(m=>m.uid).filter(Boolean);
    Promise.all(uids.map(uid=>
      firebase.firestore().collection("users").doc(uid).get()
        .then(d=>d.exists?{uid,...d.data()}:null).catch(()=>null)
    )).then(profiles=>{
      const map={};
      profiles.filter(Boolean).forEach(p=>{ map[p.uid]=p; });
      setMemberProfiles(map);
    });
  },[team.id]);

  // Real-time chat listener
  useEffect(()=>{
    if(!team.id) return;
    const unsub = firebase.firestore()
      .collection("teams").doc(team.id)
      .collection("messages")
      .onSnapshot(snap=>{
        const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
        msgs.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
        setMessages(msgs);
        setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),50);
      });
    return ()=>unsub();
  },[team.id]);

  const sendMsg=async()=>{
    if(!chatInput.trim()||!myId) return;
    const txt = chatInput; setChatInput("");
    try {
      await firebase.firestore().collection("teams").doc(team.id)
        .collection("messages").add({
          sender: user.name||"You",
          text: txt,
          uid: myId,
          timestamp: Date.now()
        });
    } catch(e){ console.warn("Chat send failed"); }
  };
  return (
    <div className="page page-enter">
      <button className="btn btn-ghost btn-sm mb-24" onClick={onBack}>← Back to Teams</button>
      <div className="team-detail-hero">
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:24,color:"var(--white)",marginBottom:4}}>{team.name}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.5)",marginBottom:12}}>{team.project} · {team.type}</div>
          <div style={{display:"flex",gap:8}}>
            <span className={`tag ${team.privacy==="Private"?"tag-red":"tag-green"}`}>{team.privacy==="Private"?"🔒 Private":"🌐 Public"}</span>
            <span className={`tag ${team.status==="Active"?"tag-green":"tag-gold"}`}>{team.status}</span>
            <span className="tag tag-default">{team.members.length} members</span>
          </div>
        </div>
      </div>
      <div className="two-col">
        <div className="card">
          <div className="card-title mb-16">Team Members &amp; Skills</div>
          {teamMembers.map((m,i)=>{
            const profile = m.uid ? memberProfiles[m.uid] : null;
            const skills = profile?.profileSkills || m.skills || [];
            return (
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16,paddingBottom:16,borderBottom:i<teamMembers.length-1?"1px solid var(--border)":"none"}}>
                <div className="avatar">{m.initials}</div>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:600,fontSize:14}}>{m.name}</div>
                    {isOwner&&m.uid&&m.uid!==myId&&<button className="btn btn-danger btn-sm" style={{padding:"1px 8px",fontSize:11}} onClick={()=>kickMember(m)}>Kick</button>}
                  </div>
                  {profile?.major&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}>{profile.major}{profile.year?" · Year "+profile.year:""}</div>}
                  <div className="tags-wrap" style={{marginTop:4}}>
                    {skills.length>0
                      ? skills.map(s=><span key={s} className="tag tag-accent">{s}</span>)
                      : <span style={{fontSize:12,color:"var(--text3)"}}>No skills listed</span>}
                  </div>
                </div>
              </div>
            );
          })}
          {team.skills.length>0&&(
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}}>Team Skills</div>
              <div className="tags-wrap">{team.skills.map(s=><span key={s} className="tag tag-cyan">{s}</span>)}</div>
            </div>
          )}
        </div>
        <div>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16,marginBottom:12}}>Team Chat</div>
          <div className="chat-window">
            <div className="chat-header">
              <span style={{fontSize:16}}>💬</span>
              <span style={{fontWeight:600,fontSize:14}}>{team.name}</span>
              <span className="tag tag-green" style={{marginLeft:"auto",fontSize:11}}>● Online</span>
            </div>
            <div className="chat-messages">
              {messages.map(msg=>{
                const isMe = msg.uid===myId;
                return (
                  <div key={msg.id} className={`chat-msg ${isMe?"chat-msg-me":"chat-msg-them"}`}>
                    {!isMe&&<div className="chat-sender">{msg.sender}</div>}
                    <div className={`chat-bubble ${isMe?"chat-bubble-me":"chat-bubble-them"}`}>{msg.text}</div>
                  </div>
                );
              })}
              <div ref={chatEndRef}/>
            </div>
            <div className="chat-input-row">
              <input className="chat-input" placeholder="Type a message…" value={chatInput}
                onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()}/>
              <button className="btn btn-primary btn-sm" onClick={sendMsg}>Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const TeamsPage = ({ user }) => {
  const [teams,setTeams]=useState([]);
  const [publicTeams,setPublicTeams]=useState([]);
  const [requests,setRequests]=useState([]);
  const [showCreate,setShowCreate]=useState(false);
  const [selectedTeam,setSelectedTeam]=useState(null);
  const [newTeam,setNewTeam]=useState({name:"",project:"",type:"",privacy:"Public",skills:[]});
  const [inviteModal,setInviteModal]=useState(null);
  const [inviteSearch,setInviteSearch]=useState("");
  const [inviteResults,setInviteResults]=useState([]);
  const [inviteSent,setInviteSent]=useState(false);
  const [joinModal,setJoinModal]=useState(false);
  const [joinSearch,setJoinSearch]=useState("");
  const setNT=(k,v)=>setNewTeam(t=>({...t,[k]:v}));
  const toggleTeamSkill=s=>setNewTeam(t=>({...t,skills:t.skills.includes(s)?t.skills.filter(x=>x!==s):[...t.skills,s]}));
  const handleRequest=(id)=>setRequests(r=>r.filter(req=>req.id!==id));
  const uid = user.user_id || user.id;

  useEffect(()=>{
    // Load user's teams from Firestore
    firebase.firestore().collection("teams")
      .where("memberIds","array-contains",uid)
      .get()
      .then(snap=>{
        setTeams(snap.docs.map(d=>({...d.data(),id:d.id})));
      }).catch(()=>{});
  },[]);

  const createTeam=async()=>{
    if(!newTeam.name)return;
    const teamData = {
      name:newTeam.name, project:newTeam.project, type:newTeam.type,
      privacy:newTeam.privacy, skills:newTeam.skills,
      status:"Recruiting",
      members:[{name:user.name,initials:getInitials(user.name),uid}],
      memberIds:[uid],
      pendingRequests:0, chat:[],
      createdBy:uid, createdAt:Date.now()
    };
    try {
      const ref = await firebase.firestore().collection("teams").add(teamData);
      setTeams(t=>[...t,{...teamData,id:ref.id}]);
    } catch(e){ console.warn("Firestore save failed, showing locally"); setTeams(t=>[...t,{...teamData,id:Date.now().toString()}]); }
    setNewTeam({name:"",project:"",type:"",privacy:"Public",skills:[]}); setShowCreate(false);
  };

  const openJoinModal=async()=>{
    setJoinModal(true);
    try {
      const snap = await firebase.firestore().collection("teams").where("privacy","==","Public").get();
      setPublicTeams(snap.docs.map(d=>({...d.data(),id:d.id})).filter(t=>!t.memberIds?.includes(uid)));
    } catch(e){ setPublicTeams([]); }
  };

  const requestJoin=async(team)=>{
    try {
      const req = {uid, name:user.name, initials:getInitials(user.name), major:user.major||"", requestedAt:Date.now()};
      await firebase.firestore().collection("teams").doc(team.id).update({
        pendingMembers: firebase.firestore.FieldValue.arrayUnion(req)
      });
      // Notify team owner
      try {
        await firebase.firestore().collection("users").doc(team.createdBy).collection("notifications").add({
          type:"join_request", fromName:user.name, teamId:team.id, teamName:team.name,
          timestamp:Date.now(), read:false
        });
      } catch(e){}
      setPublicTeams(t=>t.filter(pt=>pt.id!==team.id));
      alert("Request sent! The team owner will review it.");
      setJoinModal(false);
    } catch(e){ alert("Could not send request."); }
  };

  const acceptRequest=async(teamId, req)=>{
    try {
      const teamRef = firebase.firestore().collection("teams").doc(teamId);
      await teamRef.update({
        memberIds: firebase.firestore.FieldValue.arrayUnion(req.uid),
        members: firebase.firestore.FieldValue.arrayUnion({name:req.name,initials:req.initials,uid:req.uid}),
        pendingMembers: firebase.firestore.FieldValue.arrayRemove(req)
      });
      setTeams(t=>t.map(team=>team.id===teamId?{...team,
        members:[...team.members,{name:req.name,initials:req.initials,uid:req.uid}],
        memberIds:[...team.memberIds,req.uid],
        pendingMembers:(team.pendingMembers||[]).filter(r=>r.uid!==req.uid)
      }:team));
    } catch(e){ alert("Could not accept request."); }
  };

  const declineRequest=async(teamId, req)=>{
    try {
      await firebase.firestore().collection("teams").doc(teamId).update({
        pendingMembers: firebase.firestore.FieldValue.arrayRemove(req)
      });
      setTeams(t=>t.map(team=>team.id===teamId?{...team,
        pendingMembers:(team.pendingMembers||[]).filter(r=>r.uid!==req.uid)
      }:team));
    } catch(e){}
  };

  const searchInviteUsers=async(query)=>{
    setInviteSearch(query);
    if(query.trim().length<2){setInviteResults([]);return;}
    try {
      const snap = await firebase.firestore().collection("users").get();
      const results = snap.docs.map(d=>d.data())
        .filter(u=>(u.user_id||u.id)!==uid && u.name && u.name.toLowerCase().includes(query.toLowerCase()));
      setInviteResults(results.slice(0,5));
    } catch(e){ setInviteResults([]); }
  };
  const deleteTeam=async(teamId)=>{
    if(!window.confirm("Delete this team? This cannot be undone.")) return;
    try {
      await firebase.firestore().collection("teams").doc(teamId).delete();
      setTeams(t=>t.filter(team=>team.id!==teamId));
    } catch(e){ alert("Could not delete team."); }
  };

  const sendInvite=async(targetUser)=>{
    const targetUid = targetUser.user_id||targetUser.id;
    try {
      await firebase.firestore().collection("users").doc(targetUid)
        .collection("notifications").add({
          type:"team_invite", fromName:user.name, fromUid:uid,
          teamId:inviteModal.id, teamName:inviteModal.name,
          timestamp:Date.now(), read:false, responded:false
        });
      setInviteSent(true);
      setTimeout(()=>{setInviteSent(false);setInviteModal(null);setInviteSearch("");setInviteResults([]);},1500);
    } catch(e){ alert("Invite failed. Make sure Firestore rules allow writing to other users notifications subcollection."); }
  };
  if(selectedTeam) return <TeamDetailPage team={selectedTeam} onBack={()=>setSelectedTeam(null)} user={user}/>;
  return (
    <div className="page page-enter">
      <div className="flex-between mb-24">
        <div><div className="section-title">My Teams</div><div className="section-sub">Manage your project teams and invitations</div></div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-outline" onClick={openJoinModal}>⊕ Join Team</button>
          <button className="btn btn-primary" onClick={()=>setShowCreate(!showCreate)}>+ Create Team</button>
        </div>
      </div>
      {teams.filter(t=>t.createdBy===uid&&(t.pendingMembers||[]).length>0).map(team=>(
        <div className="card mb-24" key={team.id}>
          <div className="flex-between mb-16">
            <div><div className="card-title">Join Requests — {team.name}</div></div>
            <span className="badge">{(team.pendingMembers||[]).length}</span>
          </div>
          {(team.pendingMembers||[]).map((req,i)=>(
            <div className="request-item" key={i}>
              <div className="avatar" style={{width:34,height:34,fontSize:13}}>{getInitials(req.name)}</div>
              <div className="request-name">{req.name}<div style={{fontSize:12,color:"var(--text3)"}}>{req.major}</div></div>
              <div className="request-actions">
                <button className="btn btn-sm" style={{background:"var(--green)",color:"var(--white)"}} onClick={()=>acceptRequest(team.id,req)}>Accept</button>
                <button className="btn btn-sm btn-outline" onClick={()=>declineRequest(team.id,req)}>Decline</button>
              </div>
            </div>
          ))}
        </div>
      ))}
      {showCreate&&(
        <div className="card mb-24" style={{borderColor:"var(--accent)",borderWidth:2}}>
          <div className="card-title mb-16">Create New Team</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Team Name</label>
              <input className="form-input" placeholder="e.g. AI Builders" value={newTeam.name} onChange={e=>setNT("name",e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Project Name</label>
              <input className="form-input" placeholder="e.g. Smart Campus App" value={newTeam.project} onChange={e=>setNT("project",e.target.value)}/></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Project Type</label>
              <input className="form-input" placeholder="e.g. Course Project, Hackathon, Research…" value={newTeam.type} onChange={e=>setNT("type",e.target.value)}/></div>
            <div className="form-group">
              <label className="form-label">Privacy</label>
              <select className="form-select" value={newTeam.privacy} onChange={e=>setNT("privacy",e.target.value)}>
                <option value="Public">Public</option>
                <option value="Private">Private</option>
              </select>
              {newTeam.privacy==="Private"
                ?<div className="privacy-note privacy-private">🔒 Only invited members can join this team</div>
                :<div className="privacy-note privacy-public">🌐 Users must send a request to join. Team will appear in search results</div>}
            </div>
          </div>
          <div className="form-group" style={{marginTop:4}}>
            <label className="form-label">Skills Needed for This Team</label>
            <div className="tags-wrap" style={{marginTop:6}}>
              {ALL_SKILLS.map(s=>(
                <button key={s} type="button"
                  style={{padding:"4px 10px",borderRadius:"99px",fontSize:"12px",cursor:"pointer",margin:"2px",
                    border:newTeam.skills.includes(s)?"1.5px solid var(--accent)":"1.5px solid var(--border)",
                    background:newTeam.skills.includes(s)?"var(--accent)":"transparent",
                    color:newTeam.skills.includes(s)?"var(--white)":"var(--text2)"}}
                  onClick={()=>toggleTeamSkill(s)}>{s}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="btn btn-primary" onClick={createTeam}>Create Team</button>
            <button className="btn btn-ghost" onClick={()=>setShowCreate(false)}>Cancel</button>
          </div>
        </div>
      )}
      {teams.length===0&&<div className="empty-state"><div className="empty-icon">⬡</div><div className="empty-title">No teams yet</div><div className="empty-sub">Create or join a team to get started</div></div>}
      <div className="match-grid">
        {teams.map(team=>(
          <div className="team-card" key={team.id}>
            <div className="team-header">
              <div>
                <div className="team-name">{team.name}</div>
                <div style={{fontSize:13,color:"var(--text3)",marginTop:2}}>{team.project}</div>
                {team.type&&<div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{team.type}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <span className={`tag ${team.status==="Active"?"tag-green":"tag-gold"}`}>{team.status}</span>
                <span className={`tag ${team.privacy==="Private"?"tag-red":"tag-cyan"}`}>{team.privacy==="Private"?"🔒 Private":"🌐 Public"}</span>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}}>Members · {team.members.length}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div className="team-members">{team.members.slice(0,4).map((m,i)=><div key={i} className="team-avatar" title={m.name}>{m.initials}</div>)}</div>
                <span style={{fontSize:12,color:"var(--text3)",marginLeft:10}}>{team.members.map(m=>m.name).join(", ")}</span>
              </div>
            </div>
            {team.skills.length>0&&<div style={{marginBottom:16}}><div className="tags-wrap">{team.skills.map(s=><span key={s} className="skill-pill-sm">{s}</span>)}</div></div>}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-primary btn-sm" onClick={()=>setSelectedTeam(team)}>View Team</button>
              <button className="btn btn-outline btn-sm" onClick={()=>setInviteModal(team)}>✉ Invite</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setSelectedTeam(team)}>💬 Chat</button>
              {team.createdBy===uid&&<button className="btn btn-danger btn-sm" onClick={()=>deleteTeam(team.id)}>🗑 Delete</button>}
              {team.pendingRequests>0&&<span style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--gold)"}}>
                <span className="notif-dot" style={{background:"var(--gold)"}}/>{team.pendingRequests} requests</span>}
            </div>
          </div>
        ))}
      </div>
      {inviteModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target.className.includes("modal-overlay")){setInviteModal(null);setInviteSearch("");setInviteResults([]);}}}>
          <div className="modal">
            <div className="modal-title">Invite to {inviteModal.name}</div>
            {inviteSent?<div className="success-banner">✓ Invite sent!</div>:(
              <>
                <div className="form-group"><label className="form-label">Search by Name</label>
                  <input className="form-input" placeholder="Type a student name…" value={inviteSearch} onChange={e=>searchInviteUsers(e.target.value)} autoFocus/></div>
                {inviteResults.length>0&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:"var(--r-sm)",overflow:"hidden",marginBottom:12}}>
                    {inviteResults.map((u,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderBottom:i<inviteResults.length-1?"1px solid var(--border)":"none",background:"var(--white)"}}>
                        <div className="avatar" style={{width:32,height:32,fontSize:12}}>{getInitials(u.name)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                          <div style={{fontSize:12,color:"var(--text3)"}}>{u.major||""}{u.year?" · Year "+u.year:""}</div>
                        </div>
                        <button className="btn btn-primary btn-sm" onClick={()=>sendInvite(u)}>Invite</button>
                      </div>
                    ))}
                  </div>
                )}
                {inviteSearch.length>=2&&inviteResults.length===0&&<div style={{fontSize:13,color:"var(--text3)",marginBottom:12}}>No users found with that name.</div>}
              </>
            )}
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>{setInviteModal(null);setInviteSearch("");setInviteResults([]);}}>Close</button>
            </div>
          </div>
        </div>
      )}
      {joinModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target.className.includes("modal-overlay"))setJoinModal(false);}}>
          <div className="modal">
            <div className="modal-title">Join a Public Team</div>
            <div className="form-group"><label className="form-label">Search Teams</label>
              <input className="form-input" placeholder="Search by name or project…" value={joinSearch} onChange={e=>setJoinSearch(e.target.value)}/></div>
            {publicTeams.filter(t=>!joinSearch||t.name.toLowerCase().includes(joinSearch.toLowerCase())||((t.project||"").toLowerCase().includes(joinSearch.toLowerCase()))).length===0
              ?<div style={{color:"var(--text3)",fontSize:13,padding:"12px 0"}}>No public teams found. Create one or ask teammates to make their team public.</div>
              :publicTeams.filter(t=>!joinSearch||t.name.toLowerCase().includes(joinSearch.toLowerCase())||((t.project||"").toLowerCase().includes(joinSearch.toLowerCase()))).map((t,i)=>(
                <div key={i} className="request-item">
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                    <div style={{fontSize:12,color:"var(--text3)"}}>{t.project}{t.type?" · "+t.type:""}</div>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={()=>requestJoin(t)}>Join</button>
                </div>
              ))
            }
            <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setJoinModal(false)}>Close</button></div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── APP SHELL ──────────────────────────────────
const AppShell = ({ user, onLogout, setUser }) => {
  const [page,setPage]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [notifs,setNotifs]=useState([]);
  const [showNotifs,setShowNotifs]=useState(false);
  const uid = user.user_id || user.id;

  useEffect(()=>{
    if(!uid) return;
    const unsub = firebase.firestore().collection("users").doc(uid)
      .collection("notifications").limit(30)
      .onSnapshot(snap=>{
        const items=snap.docs.map(d=>({id:d.id,...d.data()}));
        items.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
        setNotifs(items);
      });
    return ()=>unsub();
  },[uid]);

  const markAllRead=async()=>{
    const unread = notifs.filter(n=>!n.read);
    await Promise.all(unread.map(n=>
      firebase.firestore().collection("users").doc(uid).collection("notifications").doc(n.id).update({read:true})
    ));
  };

  const acceptInvite=async(n,e)=>{
    if(e){e.stopPropagation();e.preventDefault();}
    try {
      await firebase.firestore().collection("teams").doc(n.teamId).update({
        memberIds: firebase.firestore.FieldValue.arrayUnion(uid),
        members: firebase.firestore.FieldValue.arrayUnion({name:user.name,initials:getInitials(user.name),uid})
      });
    } catch(err){ alert("Could not join team. Check Firestore rules cover teams subcollections.
"+err.message); return; }
    // Mark notification responded (needs subcollection Firestore rule)
    firebase.firestore().collection("users").doc(uid).collection("notifications").doc(n.id)
      .update({responded:true,response:"accepted"}).catch(()=>{});
    setShowNotifs(false); setPage("teams");
  };

  const declineInvite=async(n,e)=>{
    if(e){e.stopPropagation();e.preventDefault();}
    firebase.firestore().collection("users").doc(uid).collection("notifications").doc(n.id)
      .update({responded:true,response:"declined"}).catch(()=>{});
  };

  const unreadCount = notifs.filter(n=>!n.read).length;
  const pendingCount = unreadCount;
  const PAGE_TITLES={dashboard:"Dashboard",find:"Find Teammates",teams:"My Teams",profile:"My Profile"};
  return (
    <div className="app-shell">
      <div className="mobile-header">
        <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}><span/><span/><span/></button>
        <img src={LOGO_SRC} className="mobile-logo-img" alt="Logo"/>
        <div className="mobile-logo">Taazur</div>
        <div className="avatar" style={{width:32,height:32,fontSize:12}}>{getInitials(user.name)}</div>
      </div>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={onLogout}
        pendingCount={pendingCount} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{PAGE_TITLES[page]}</div>
          <div className="topbar-spacer"/>
          <div className="topbar-badge">{user.major||"Student"}{user.year?` · Year ${user.year}`:""}</div>
          <div style={{position:"relative"}}>
            <button className="btn btn-ghost btn-sm" style={{fontSize:18,padding:"6px 10px",position:"relative"}}
              onClick={()=>setShowNotifs(o=>!o)}>
              🔔{unreadCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:"var(--red)",color:"white",borderRadius:"50%",fontSize:10,width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadCount}</span>}
            </button>
            {showNotifs&&(
              <div style={{position:"absolute",right:0,top:44,width:320,background:"var(--white)",border:"1px solid var(--border)",borderRadius:"var(--r)",boxShadow:"var(--shadow-lg)",zIndex:200,maxHeight:360,overflowY:"auto"}}>
                <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:14}}>Notifications</div>
                {notifs.length===0?<div style={{padding:16,color:"var(--text3)",fontSize:13}}>No notifications yet</div>:
                  notifs.map(n=>(
                    <div key={n.id} style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",background:n.read?"var(--white)":"var(--surface2)"}}>
                      <div style={{fontSize:13,fontWeight:500}}>
                        {n.type==="join_request"?"🙋 "+n.fromName+" wants to join "+n.teamName
                         :n.type==="team_invite"?"✉️ "+n.fromName+" invited you to "+n.teamName
                         :"📣 "+n.teamName}
                      </div>
                      <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>{new Date(n.timestamp).toLocaleDateString()}</div>
                      {n.type==="team_invite"&&!n.responded&&(
                        <div style={{display:"flex",gap:6,marginTop:8}}>
                          <button className="btn btn-sm" style={{background:"var(--green)",color:"white",padding:"4px 12px",fontSize:12}} onClick={e=>{e.stopPropagation();acceptInvite(n,e);}}>Accept</button>
                          <button className="btn btn-sm btn-outline" style={{padding:"4px 12px",fontSize:12}} onClick={e=>{e.stopPropagation();declineInvite(n,e);}}>Decline</button>
                        </div>
                      )}
                      {n.type==="team_invite"&&n.responded&&(
                        <div style={{fontSize:11,color:n.response==="accepted"?"var(--green)":"var(--text3)",marginTop:4}}>
                          {n.response==="accepted"?"✓ Accepted":"✗ Declined"}
                        </div>
                      )}
                      {n.type==="join_request"&&(
                        <button className="btn btn-ghost btn-sm" style={{fontSize:11,padding:"2px 8px",marginTop:4}} onClick={()=>{setPage("teams");setShowNotifs(false);}}>View in My Teams →</button>
                      )}
                    </div>
                  ))
                }
              </div>
            )}
          </div>
          <div className="avatar" style={{cursor:"pointer"}} onClick={()=>setPage("profile")}>{getInitials(user.name)}</div>
        </div>
        {page==="dashboard"&&<DashboardPage user={user} setPage={setPage}/>}
        {page==="find"&&<FindPage user={user}/>}
        {page==="profile"&&<ProfilePage user={user} updateUser={setUser} onLogout={onLogout}/>}
        {page==="teams"&&<TeamsPage user={user}/>}
      </div>
    </div>
  );
};

// ── ROOT ───────────────────────────────────────
const App = () => {
  const [user,setUser]=useState(undefined); // undefined=loading, null=logged out
  const [authPage,setAuthPage]=useState("login");

  useEffect(()=>{
    const unsub = firebase.auth().onAuthStateChanged(async firebaseUser => {
      if(firebaseUser){
        try {
          const doc = await firebase.firestore().collection("users").doc(firebaseUser.uid).get();
          setUser(doc.exists ? {...doc.data(),user_id:firebaseUser.uid,id:firebaseUser.uid}
            : {user_id:firebaseUser.uid,id:firebaseUser.uid,name:firebaseUser.email,email:firebaseUser.email});
        } catch(e){ setUser({user_id:firebaseUser.uid,id:firebaseUser.uid,name:firebaseUser.email,email:firebaseUser.email}); }
      } else { setUser(null); }
    });
    return ()=>unsub();
  },[]);

  const handleLogout=()=>{ firebase.auth().signOut(); };
  const handleUpdate=async u=>{
    setUser(u);
    try{ await firebase.firestore().collection("users").doc(u.user_id||u.id).set(u,{merge:true}); }catch(e){}
  };

  if(user===undefined) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"var(--ink)"}}>
      <div className="spinner" style={{borderTopColor:"var(--accent3)"}}/>
    </div>
  );
  if(!user) return authPage==="login"
    ?<LoginPage onLogin={setUser} onSwitch={()=>setAuthPage("signup")}/>
    :<SignupPage onLogin={setUser} onSwitch={()=>setAuthPage("login")}/>;
  return <AppShell user={user} onLogout={handleLogout} setUser={handleUpdate}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
