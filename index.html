<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0d0e14; --ink2: #1a1c28; --ink3: #252840;
    --surface: #f4f3f0; --surface2: #eceae5; --surface3: #e0ddd6;

  .app-shell { display: flex; min-height: 100vh; }

  .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,.07); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

  .logo-sub { font-size: 10px; color: rgba(255,255,255,.3); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 400; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 0 12px; }
  .nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.25); padding: 0 12px; margin: 16px 0 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--r-sm); color: rgba(255,255,255,.5); cursor: pointer; font-size: 14px; font-weight: 400; transition: all .2s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .user-mini:hover { background: rgba(255,255,255,.06); }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--white); flex-shrink: 0; }
  .avatar.lg { width: 64px; height: 64px; font-size: 22px; }
  .user-info-mini { flex: 1; min-width: 0; }

  .user-role-mini { font-size: 11px; color: rgba(255,255,255,.3); }
  .main-content { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { height: 64px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; position: sticky; top: 0; z-index: 50; gap: 16px; }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
  .topbar-spacer { flex: 1; }
  .topbar-badge { background: var(--ink); color: var(--white); font-size: 12px; padding: 4px 12px; border-radius: 99px; font-weight: 500; }

  .auth-shell { min-height: 100vh; display: flex; align-items: stretch; background: var(--ink); }

  .auth-left::after { content: ''; position: absolute; bottom: -50px; left: -50px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(6,182,212,.15) 0%, transparent 70%); pointer-events: none; }

  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .auth-switch a { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; }
  .auth-switch a:hover { text-decoration: underline; }

  .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 7px; }
  .form-input { width: 100%; padding: 11px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-sm); font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color .2s, box-shadow .2s; outline: none; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .form-select { width: 100%; padding: 11px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-sm); font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color .2s; outline: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg xmlns='[w3.org](http://www.w3.org/2000/svg)' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b8d9e' stroke-width='2'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 36px; }
  .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 20px; border-radius: var(--r-sm); font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; border: none; white-space: nowrap; }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-primary:hover { background: var(--ink2); transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--white); }
  .btn-accent:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,70,229,.35); }
  .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text2); padding: 8px 14px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red); color: var(--white); }
  .btn-danger:hover { opacity: .85; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; box-shadow: var(--shadow); }
  .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text3); }

  .request-name { font-size: 14px; font-weight: 500; flex: 1; }

  .success-banner { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .info-banner { background: rgba(79,70,229,.07); border: 1px solid rgba(79,70,229,.15); border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .error-banner { font-size: 13px; padding: 10px 14px; background: rgba(239,68,68,.08); border-radius: var(--r-sm); border: 1px solid rgba(239,68,68,.2); color: var(--red); margin-bottom: 16px; }

    .form-row, .two-col { grid-template-columns: 1fr; }

    .welcome-banner { flex-direction: column; gap: 20px; align-items: flex-start; }
    .welcome-actions { flex-direction: row; flex-wrap: wrap; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .profile-hero { flex-direction: column; text-align: center; }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const ALL_SKILLS = ["Python","JavaScript","React","Node.js","Machine Learning","Data Analysis","UI/UX Design","Figma","Deep Learning","Backend Dev","Mobile Dev","SQL","DevOps","Cybersecurity","NLP","Computer Vision","Flutter","Swift","Project Management","Research"];
const SKILL_LEVEL_LABELS = { 1:"Beginner", 2:"Intermediate", 3:"Advanced" };
const getInitials = name => name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const getScoreColor = s => s>=80?"#10b981":s>=60?"#f59e0b":"#8b8d9e";
const getScoreClass = s => s>=80?"high":s>=60?"medium":"low";

const ScoreRing = ({ score, size=52 }) => {
  const r=(size-6)/2, circ=2*Math.PI*r, fill=(score/100)*circ, color=getScoreColor(score);
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${fill} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:size>50?14:11,color}}>{score}%</span>
      </div>
    </div>
  );
};

// ── LOGIN ──────────────────────────────────────
const LoginPage = ({ onLogin, onSwitch }) => {
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const handleSubmit = e => {
    e.preventDefault();
    setError("");
    if(!name.trim()||!email.trim()){setError("Please fill in all fields.");return;}
    setLoading(true);
    setTimeout(()=>{
      onLogin({ id: Date.now(), name: name.trim(), email: email.trim() });
    }, 600);
  };

  return (
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-logo-area">
          <div style={{width:44,height:44,background:"linear-gradient(135deg,#4f46e5,#06b6d4)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"#fff"}}>T</div>
          <div className="auth-brand">Taazur<span>.</span></div>
        </div>
        <p className="auth-tagline">AI-based student team formation system that helps you find the perfect teammates based on your skills and needs.</p>
        {["Skill-based compatibility matching","AI-generated match explanations","Real-time team collaboration tools","Smart invite & request system"].map((f,i)=>(
          <div className="auth-feature" key={i}><span className="auth-feature-dot"/>{f}</div>
        ))}
      </div>
      <div className="auth-right">
        <div className="auth-card">
          <div className="auth-card-title">Welcome to Taazur</div>
          <div className="auth-card-sub">Enter your name and email to get started</div>
          {error&&<div className="error-banner">{error}</div>}
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your full name" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" placeholder="you@university.edu" value={email} onChange={e=>setEmail(e.target.value)}/>
            </div>
            <button type="submit" className="btn btn-primary btn-full btn-lg" style={{marginTop:8}} disabled={loading}>
              {loading?"Getting started…":"Get Started →"}
            </button>
          </form>
          <div className="auth-switch">Already have an account? <a onClick={onSwitch}>Sign up instead</a></div>
        </div>
      </div>
    </div>
  );
};

// ── SIGNUP ─────────────────────────────────────
const SignupPage = ({ onLogin, onSwitch }) => {
  const [form,setForm]=useState({name:"",email:"",major:"",college:"",year:""});
  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleSubmit = e => {
    e.preventDefault();
    if(!form.name||!form.email) return;
    setLoading(true);
    setTimeout(()=>onLogin({id:Date.now(),...form}), 800);
  };

  return (
    <div className="auth-shell">
      <div className="auth-left">
        <div className="auth-logo-area">
          <div style={{width:44,height:44,background:"linear-gradient(135deg,#4f46e5,#06b6d4)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"#fff"}}>T</div>
          <div className="auth-brand">Taazur<span>.</span></div>
        </div>
        <p className="auth-tagline">Join Taazur and get matched with the best teammates at your university using AI.</p>
        {["Set up your skill profile in minutes","Get matched with compatible teammates","Form teams and start building together","Connect with the best talent at your university"].map((f,i)=>(
          <div className="auth-feature" key={i}><span className="auth-feature-dot"/>{f}</div>
        ))}
      </div>
      <div className="auth-right">
        <div className="auth-card">
          <div className="auth-card-title">Create account</div>
          <div className="auth-card-sub">Join Taazur — it's free</div>
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your full name" value={form.name} onChange={e=>set("name",e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" placeholder="you@university.edu" value={form.email} onChange={e=>set("email",e.target.value)}/>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Major</label>
                <input className="form-input" placeholder="e.g. Computer Science" value={form.major} onChange={e=>set("major",e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">College</label>
                <input className="form-input" placeholder="e.g. Engineering" value={form.college} onChange={e=>set("college",e.target.value)}/>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Academic Year</label>
              <select className="form-select" value={form.year} onChange={e=>set("year",e.target.value)}>
                <option value="">Select year…</option>
                {[1,2,3,4,5,6].map(y=><option key={y} value={String(y)}>Year {y}</option>)}
              </select>
            </div>
            <button type="submit" className="btn btn-primary btn-full btn-lg" style={{marginTop:4}} disabled={loading}>
              {loading?"Creating account…":"Create Account →"}
            </button>
          </form>
          <div className="auth-switch">Already have an account? <a onClick={onSwitch}>Sign in</a></div>
        </div>
      </div>
    </div>
  );
};

// ── SIDEBAR ────────────────────────────────────
const Sidebar = ({ page, setPage, user, onLogout, open, onClose }) => {
  const navItems = [
    {id:"dashboard",icon:"⊞",label:"Dashboard"},
    {id:"find",     icon:"◎",label:"Find Teammates"},
    {id:"teams",    icon:"⬡",label:"My Teams"},
    {id:"profile",  icon:"◉",label:"My Profile"},
  ];
  return (
    <>
      <div className={`sidebar-overlay ${open?"open":""}`} onClick={onClose}/>
      <nav className={`sidebar ${open?"open":""}`}>
        <div className="sidebar-logo">
          <div style={{width:36,height:36,background:"linear-gradient(135deg,#4f46e5,#06b6d4)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:18,color:"#fff",flexShrink:0}}>T</div>
          <div>
            <div className="logo-mark">Taazur</div>
            <div className="logo-sub">AI Team Formation</div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section-label">Navigation</div>
          {navItems.map(item=>(
            <button key={item.id} className={`nav-item ${page===item.id?"active":""}`}
              onClick={()=>{setPage(item.id);onClose();}}>
              <span className="nav-icon">{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="user-mini" onClick={()=>{setPage("profile");onClose();}}>
            <div className="avatar">{getInitials(user.name)}</div>
            <div className="user-info-mini">
              <div className="user-name-mini">{user.name}</div>
              <div className="user-role-mini">{user.major||"Student"}</div>
            </div>
          </div>
        </div>
      </nav>
    </>
  );
};

// ── DASHBOARD ──────────────────────────────────
const DashboardPage = ({ user, setPage }) => {
  const profileCompletion = [user.major,user.college,user.year,user.bio,user.skillLevels&&Object.keys(user.skillLevels).length>0].filter(Boolean).length * 20;
  return (
    <div className="page page-enter">
      <div className="welcome-banner">
        <div className="welcome-text">
          <div className="welcome-greeting">Good day,</div>
          <div className="welcome-name">Hello, <span>{user.name.split(" ")[0]}</span> 👋</div>
          <div className="welcome-sub">Find your perfect team using Taazur AI-powered matching</div>
        </div>
        <div className="welcome-actions">
          <button className="action-btn action-btn-primary" onClick={()=>setPage("find")}>◎ Find Teammates</button>
          <button className="action-btn action-btn-secondary" onClick={()=>setPage("teams")}>⬡ My Teams</button>
        </div>
      </div>
      <div className="two-col">
        <div className="card">
          <div className="flex-between mb-16">
            <div><div className="card-title">Profile Completion</div><div className="card-sub">Complete to get better matches</div></div>
            <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,color:"var(--accent)"}}>{profileCompletion}%</span>
          </div>
          <div className="completion-bar" style={{height:8,marginBottom:16}}>
            <div className="completion-fill" style={{width:`${profileCompletion}%`}}/>
          </div>
          {[
            {label:"Basic Info",done:!!(user.name&&user.email)},
            {label:"Major & College",done:!!(user.major&&user.college)},
            {label:"Academic Year",done:!!user.year},
            {label:"Skills Added",done:!!(user.skillLevels&&Object.keys(user.skillLevels).length>0)},
            {label:"Bio Written",done:!!user.bio},
          ].map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:14,color:item.done?"var(--green)":"var(--surface3)"}}>{item.done?"✓":"○"}</span>
              <span style={{fontSize:14,color:item.done?"var(--text)":"var(--text3)"}}>{item.label}</span>
            </div>
          ))}
          <button className="btn btn-primary btn-sm mt-16" onClick={()=>setPage("profile")}>Complete Profile →</button>
        </div>
        <div className="card">
          <div className="card-title mb-16">Quick Actions</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <button className="btn btn-accent btn-full" onClick={()=>setPage("find")}>◎ Find Teammates Now</button>
            <button className="btn btn-outline btn-full" onClick={()=>setPage("teams")}>⬡ View My Teams</button>
            <button className="btn btn-outline btn-full" onClick={()=>setPage("profile")}>◉ Update Profile</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── FIND TEAMMATES (REAL API) ──────────────────
const FindPage = ({ user }) => {
  const [selectedSkills, setSelectedSkills] = useState([]);
  const [matches, setMatches] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [invitedIds, setInvitedIds] = useState([]);
  const [searched, setSearched] = useState(false);

  function toggleSkill(skill) {
    setSelectedSkills(prev =>
      prev.includes(skill) ? prev.filter(s => s !== skill) : [...prev, skill]
    );
  }

  async function findTeammates() {
    if (selectedSkills.length === 0) return;
    setLoading(true);
    setError("");
    setMatches([]);
    setSearched(true);

    try {
      const response = await fetch("https://taazur-api.onrender.com/api/recommend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          skills: Object.fromEntries(selectedSkills.map(skill => [skill, 1]))
        }),
      });

      if (!response.ok) throw new Error("API error");

      const data = await response.json();
      const list = Array.isArray(data.matches) ? data.matches
                 : Array.isArray(data)           ? data
                 : [];
      setMatches(list);
    } catch (err) {
      console.error(err);
      setError("Could not connect to the API. Please check your connection and try again.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="page page-enter">
      <div className="section-header">
        <div className="section-title">Find Teammates</div>
        <div className="section-sub">Select your skills — Taazur AI finds your best real matches</div>
      </div>

      <div className="find-form-card">
        <div style={{position:"relative",zIndex:1}}>
          <div className="find-form-title">Your Skills</div>
          <div className="find-form-sub">Select all skills that apply to you</div>
          <div className="skill-chip-select">
            {ALL_SKILLS.map(skill => (
              <button
                key={skill}
                onClick={() => toggleSkill(skill)}
                className={`skill-chip ${selectedSkills.includes(skill) ? "selected" : ""}`}
              >
                {skill}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button
              className="btn btn-accent btn-lg"
              onClick={findTeammates}
              disabled={loading || selectedSkills.length === 0}
            >
              {loading ? "Searching…" : "⚡ Find My Matches"}
            </button>
            {selectedSkills.length > 0 && (
              <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>
                {selectedSkills.length} skill{selectedSkills.length > 1 ? "s" : ""} selected
              </span>
            )}
          </div>
        </div>
      </div>

      {loading && (
        <div className="loading-state">
          <div className="spinner"/>
          <div className="loading-text">Analyzing compatibility with AI…</div>
        </div>
      )}

      {error && <div className="error-banner">{error}</div>}

      {!loading && !error && matches.length > 0 && (
        <>
          <div className="results-meta">
            <div className="results-count">
              Found <strong>{matches.length} match{matches.length > 1 ? "es" : ""}</strong> — sorted by compatibility
            </div>
          </div>
          <div className="match-grid">
            {matches.map((m, i) => {
              const score = m.score_percent || m.score || 0;
              const tier = getScoreClass(score);
              const invited = invitedIds.includes(i);
              return (
                <div key={i} className={`match-card match-${tier}`}>
                  <div className="match-header">
                    <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
                      <div className="avatar">{getInitials(m.name || "U U")}</div>
                      <div className="match-info">
                        <div className="match-name">{m.name || "Anonymous"}</div>
                        <div className="match-major">
                          {m.major || ""}{m.year ? ` · ${m.year}` : ""}
                        </div>
                      </div>
                    </div>
                    {score > 0 && <ScoreRing score={score} size={56}/>}
                  </div>

                  {m.skills && (
                    <div className="tags-wrap mb-16" style={{marginBottom:12}}>
                      {(Array.isArray(m.skills)
                        ? m.skills
                        : Object.keys(m.skills)
                      ).map(s => (
                        <span key={s} className="tag tag-accent">{s}</span>
                      ))}
                    </div>
                  )}

                  {m.bio && (
                    <div className="match-explanation">💡 {m.bio}</div>
                  )}

                  <div className="match-footer" style={{marginTop:12}}>
                    <span style={{fontSize:12,color:"var(--text3)"}}>
                      {m.major || "Student"}
                    </span>
                    {invited
                      ? <div className="invite-sent">✓ Invite sent</div>
                      : <button
                          className="btn btn-primary btn-sm"
                          onClick={() => setInvitedIds(ids => [...ids, i])}
                        >
                          Invite +
                        </button>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {!loading && !error && searched && matches.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">👥</div>
          <div className="empty-title">No matches found</div>
          <div className="empty-sub">
            No teammates registered with these skills yet. Try different skills or ask teammates to register on Taazur.
          </div>
        </div>
      )}

      {!searched && !loading && (
        <div className="empty-state">
          <div className="empty-icon">◎</div>
          <div className="empty-title">Ready to find your team?</div>
          <div className="empty-sub">Select your skills above and click "Find My Matches"</div>
        </div>
      )}
    </div>
  );
};

// ── PROFILE ────────────────────────────────────
const ProfilePage = ({ user, updateUser, onLogout }) => {
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState({name:user.name,major:user.major||"",college:user.college||"",year:user.year||"",bio:user.bio||""});
  const [skillLevels, setSkillLevels] = useState(user.skillLevels || {});
  const [saved, setSaved] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const saveProfile = () => {
    updateUser({...user,...form,skillLevels});
    setEditMode(false);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2500);
  };

  return (
    <div className="page page-enter">
      <div className="profile-hero">
        <div className="avatar lg" style={{flexShrink:0}}>{getInitials(user.name)}</div>
        <div style={{flex:1}}>
          <div className="profile-hero-name">{user.name}</div>
          <div className="profile-hero-sub">{user.email}</div>
          <div className="profile-hero-tags">
            {user.major&&<span className="hero-tag">{user.major}</span>}
            {user.college&&<span className="hero-tag">{user.college}</span>}
            {user.year&&<span className="hero-tag">Year {user.year}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexDirection:"column",alignItems:"flex-end",position:"relative",zIndex:1}}>
          <button className="btn btn-outline"
            style={{color:"rgba(255,255,255,.7)",borderColor:"rgba(255,255,255,.2)",background:"rgba(255,255,255,.05)"}}
            onClick={()=>setEditMode(!editMode)}>
            {editMode ? "Cancel" : "✎ Edit Profile"}
          </button>
          <button className="btn btn-danger btn-sm" onClick={onLogout}>↩ Sign Out</button>
        </div>
      </div>

      {saved && <div className="success-banner mb-24">✓ Profile saved!</div>}

      <div className="two-col">
        <div className="card">
          <div className="card-title mb-16">Basic Info</div>
          {editMode ? (
            <>
              {[["Full Name","name"],["Major","major"],["College / Faculty","college"]].map(([label,key])=>(
                <div className="form-group" key={key}>
                  <label className="form-label">{label}</label>
                  <input className="form-input" value={form[key]} onChange={e=>set(key,e.target.value)}/>
                </div>
              ))}
              <div className="form-group">
                <label className="form-label">Academic Year</label>
                <select className="form-select" value={form.year} onChange={e=>set("year",e.target.value)}>
                  <option value="">Select year…</option>
                  {[1,2,3,4,5,6].map(y=><option key={y} value={String(y)}>Year {y}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Bio</label>
                <textarea className="form-input" rows={3} placeholder="Tell teammates about yourself…"
                  value={form.bio} onChange={e=>set("bio",e.target.value)} style={{resize:"vertical"}}/>
              </div>
              <button className="btn btn-accent btn-full" onClick={saveProfile}>✓ Save Profile</button>
            </>
          ) : (
            <div>
              {[["Major",user.major],["College",user.college],["Year",user.year&&`Year ${user.year}`],["Email",user.email]].map(([k,v])=>v&&(
                <div key={k} style={{display:"flex",gap:10,marginBottom:12,fontSize:14}}>
                  <span style={{color:"var(--text3)",width:80,flexShrink:0}}>{k}</span>
                  <span style={{fontWeight:500}}>{v}</span>
                </div>
              ))}
              {user.bio && <p style={{fontSize:14,color:"var(--text2)",marginTop:8,lineHeight:1.6}}>{user.bio}</p>}
              {!user.major && !user.bio && (
                <p style={{color:"var(--text3)",fontSize:13}}>Click "Edit Profile" to add your info.</p>
              )}
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-title mb-16">My Skills</div>
          {Object.entries(skillLevels).length === 0 && !editMode && (
            <p style={{color:"var(--text3)",fontSize:13}}>No skills added yet. Click "Edit Profile" to add skills.</p>
          )}
          {Object.entries(skillLevels).map(([skill,val])=>(
            <div key={skill} className="skill-bar-wrap">
              <div className="skill-bar-header">
                <span className="skill-bar-name">{skill}</span>
                {editMode ? (
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="range" min={1} max={3} step={1} value={val}
                      onChange={e=>setSkillLevels(sl=>({...sl,[skill]:+e.target.value}))}
                      className="skill-slider" style={{width:70}}/>
                    <span className="skill-bar-val">{val}/3</span>
                    <span style={{cursor:"pointer",color:"var(--red)",fontSize:16}}
                      onClick={()=>setSkillLevels(sl=>{const n={...sl};delete n[skill];return n;})}>×</span>
                  </span>
                ) : (
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:"var(--text3)"}}>{SKILL_LEVEL_LABELS[val]}</span>
                    <span className="skill-bar-val">{val}/3</span>
                  </span>
                )}
              </div>
              <div className="skill-bar-track">
                <div className="skill-bar-fill" style={{width:`${(val/3)*100}%`}}/>
              </div>
            </div>
          ))}
          {editMode && (
            <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
              {ALL_SKILLS.filter(s=>!skillLevels[s]).map(s=>(
                <button key={s} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:12}}
                  onClick={()=>setSkillLevels(sl=>({...sl,[s]:1}))}>+ {s}</button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── TEAMS ──────────────────────────────────────
const TeamsPage = ({ user }) => {
  const [teams, setTeams] = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [newTeam, setNewTeam] = useState({name:"",project:"",type:"",privacy:"Public"});
  const setNT = (k,v) => setNewTeam(t=>({...t,[k]:v}));

  const createTeam = () => {
    if(!newTeam.name) return;
    setTeams(t=>[...t,{id:Date.now(),...newTeam,status:"Recruiting",
      members:[{name:user.name,initials:getInitials(user.name)}],skills:[],chat:[]}]);
    setNewTeam({name:"",project:"",type:"",privacy:"Public"});
    setShowCreate(false);
  };

  return (
    <div className="page page-enter">
      <div className="flex-between mb-24">
        <div>
          <div className="section-title">My Teams</div>
          <div className="section-sub">Create and manage your project teams</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowCreate(!showCreate)}>+ Create Team</button>
      </div>

      {showCreate && (
        <div className="card mb-24" style={{borderColor:"var(--accent)",borderWidth:2}}>
          <div className="card-title mb-16">Create New Team</div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Team Name</label>
              <input className="form-input" placeholder="e.g. AI Builders" value={newTeam.name} onChange={e=>setNT("name",e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Project Name</label>
              <input className="form-input" placeholder="e.g. Smart Campus App" value={newTeam.project} onChange={e=>setNT("project",e.target.value)}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Project Type</label>
              <input className="form-input" placeholder="e.g. Hackathon, Course Project…" value={newTeam.type} onChange={e=>setNT("type",e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Privacy</label>
              <select className="form-select" value={newTeam.privacy} onChange={e=>setNT("privacy",e.target.value)}>
                <option value="Public">Public</option>
                <option value="Private">Private</option>
              </select>
              <div className={`privacy-note ${newTeam.privacy==="Private"?"privacy-private":"privacy-public"}`}>
                {newTeam.privacy==="Private" ? "🔒 Only invited members can join" : "🌐 Anyone can request to join"}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="btn btn-primary" onClick={createTeam}>Create Team</button>
            <button className="btn btn-ghost" onClick={()=>setShowCreate(false)}>Cancel</button>
          </div>
        </div>
      )}

      {teams.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">⬡</div>
          <div className="empty-title">No teams yet</div>
          <div className="empty-sub">Create your first team to get started</div>
          <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setShowCreate(true)}>+ Create Team</button>
        </div>
      ) : (
        <div className="match-grid">
          {teams.map(team=>(
            <div className="team-card" key={team.id}>
              <div className="team-header">
                <div>
                  <div className="team-name">{team.name}</div>
                  <div style={{fontSize:13,color:"var(--text3)",marginTop:2}}>{team.project}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                  <span className={`tag ${team.status==="Active"?"tag-green":"tag-gold"}`}>{team.status}</span>
                  <span className={`tag ${team.privacy==="Private"?"tag-red":"tag-cyan"}`}>
                    {team.privacy==="Private"?"🔒 Private":"🌐 Public"}
                  </span>
                </div>
              </div>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>
                {team.members.length} member{team.members.length!==1?"s":""}
              </div>
              <div className="team-members">
                {team.members.map((m,i)=>(
                  <div key={i} className="team-avatar" title={m.name}>{m.initials}</div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── APP SHELL ──────────────────────────────────
const AppShell = ({ user, onLogout, setUser }) => {
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const titles = {dashboard:"Dashboard",find:"Find Teammates",teams:"My Teams",profile:"My Profile"};

  return (
    <div className="app-shell">
      <div className="mobile-header">
        <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>
          <span/><span/><span/>
        </button>
        <div className="mobile-logo">Taazur</div>
        <div className="avatar" style={{width:32,height:32,fontSize:12}}>{getInitials(user.name)}</div>
      </div>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={onLogout}
        open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{titles[page]}</div>
          <div className="topbar-spacer"/>
          <div className="topbar-badge">
            {user.major||"Student"}{user.year?` · Year ${user.year}`:""}
          </div>
          <div className="avatar" style={{cursor:"pointer"}} onClick={()=>setPage("profile")}>
            {getInitials(user.name)}
          </div>
        </div>
        {page==="dashboard" && <DashboardPage user={user} setPage={setPage}/>}
        {page==="find"      && <FindPage user={user}/>}
        {page==="profile"   && <ProfilePage user={user} updateUser={setUser} onLogout={onLogout}/>}
        {page==="teams"     && <TeamsPage user={user}/>}
      </div>
    </div>
  );
};

// ── ROOT ───────────────────────────────────────
const App = () => {
  const [user, setUser] = useState(null);
  const [authPage, setAuthPage] = useState("login");

  if (!user) return authPage === "login"
    ? <LoginPage onLogin={setUser} onSwitch={()=>setAuthPage("signup")}/>
    : <SignupPage onLogin={setUser} onSwitch={()=>setAuthPage("login")}/>;

  return <AppShell user={user} onLogout={()=>setUser(null)} setUser={setUser}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
